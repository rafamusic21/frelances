<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodegón Los Cuñados</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="cow-layer"></div>

<div class="container">

  <div class="logo-wrap">
    <div class="logo">
      <img id="logoImg" alt="Bodegón Los Cuñados" style="display:none">
      <span id="logoFallback">🛒</span>
    </div>
    <div class="logo-badge">🛒</div>
  </div>

  <h1>Bodegón Los Cuñados</h1>
  <p class="subtitle">Tu bodegón de confianza</p>

  <div class="socials">
    <a href="tel:+584247491899" title="Llamar"><i class="fa-solid fa-phone"></i></a>
    <a href="https://wa.me/584247491899" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
    <a href="#" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
  </div>

  <button class="link-btn btn-whatsapp" onclick="openShop()">
    <i class="fa-brands fa-whatsapp"></i> Pedir por WhatsApp
  </button>

  <a class="link-btn btn-location" href="https://maps.google.com" target="_blank">
    <i class="fa-solid fa-location-dot"></i> Ubicación
  </a>

  <a class="link-btn btn-instagram" href="https://www.instagram.com/" target="_blank">
    <i class="fa-brands fa-instagram"></i> Instagram
  </a>

  <!-- ===== BOTÓN VER TODOS LOS PRODUCTOS ===== -->
  <button class="link-btn btn-productos" onclick="openGrid()">
    <i class="fa-solid fa-store"></i> Ver todos los productos
  </button>

  <!-- ===== CATÁLOGOS POR CATEGORÍA ===== -->
  <!-- Este contenedor se llena automáticamente con script.js a partir de
       las listas CATEGORIES y PRODUCT_CATALOG. No hay que tocar este HTML
       para agregar productos o categorías nuevas. -->
  <div id="catalogsContainer"></div>

  <button class="link-btn btn-whatsapp" onclick="openShop()" style="margin-top:8px;">
    <i class="fa-brands fa-whatsapp"></i> Hacer pedido
  </button>

  <a class="save" href="#" onclick="saveContact(event)">
    <i class="fa-solid fa-address-card"></i> Guardar contacto
  </a>

  <footer>Bodegón Los Cuñados © 2025 — Venezuela 🇻🇪</footer>

</div>

<!-- GRID MODAL -->
<div class="grid-overlay" id="gridOverlay">
  <div class="grid-header">
    <h2><i class="fa-solid fa-store"></i> Todos los Productos</h2>
    <button class="grid-close-btn" onclick="closeGrid()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="grid-tabs" id="gridTabs"></div>
  <div class="grid-body">
    <div class="grid-products" id="gridProducts"></div>
  </div>
</div>

<!-- MODAL TIENDA -->
<div class="shop-overlay" id="shopOverlay" onclick="closeShopOutside(event)">
  <div class="shop-modal" id="shopModal" style="padding:0;">
    <div class="shop-header">
      <h2><i class="fa-solid fa-basket-shopping"></i> Hacer Pedido</h2>
      <button class="shop-close" onclick="closeShop()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <p class="shop-subtitle">Selecciona los productos y consulta por WhatsApp 🛒</p>

    <!-- Filtros de categoría -->
    <div class="shop-filter-tabs" id="shopFilterTabs"></div>

    <div class="shop-products" id="shopProducts"></div>

    <!-- Footer fijo: paginación + botón -->
    <div class="shop-footer">
      <div class="shop-pagination" id="shopPagination" style="display:none"></div>
      <button class="send-order" id="sendBtn" onclick="sendOrder()" disabled>
        <i class="fa-brands fa-whatsapp"></i> Consultar por WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightboxOutside(event)">
  <button class="lightbox-close-btn" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
  <div class="lightbox-img-wrap">
    <img id="lbImg" src="" alt="" style="display:none">
    <div id="lbEmoji" class="lb-emoji" style="display:none"></div>
  </div>
  <div class="lightbox-name" id="lbName"></div>
  <div class="lightbox-desc" id="lbDesc"></div>
</div>

<script src="script.js"></script>
</body>
</html>
